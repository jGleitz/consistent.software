# See https://github.com/dorny/test-reporter?tab=readme-ov-file#recommended-setup-for-public-repositories
# for more info on this workflow

name: Test Report

on:
  workflow_run:
    workflows: [Build]
    types:
      - completed

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  add_report:
    name: Annotate Test Results on Pull Request
    runs-on: ubuntu-latest

    steps:
      - uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          artifact: test-results
          name: Test Results
          path: "**/*.xml"
          reporter: java-junit
          max-annotations: "50"
          fail-on-error: "false"
